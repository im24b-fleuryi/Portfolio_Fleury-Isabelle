<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <nav class="navbar">
        <div class="container">
            <a class="nav-links" href="./index.html">Home</a>
            <a class="nav-links" href="./projects.html">My Projects</a>
            <a class="nav-links" href="#">My CV</a>
        </div>
    </nav>
    <main>
        <h1>Meine Projekte</h1>

        <section class="card-grid" aria-label="Projekte Übersicht">
            <article class="card" data-title="Pfadifinder Webseite"
                data-description="Erstellung einer offiziellen Webseite der Pfadfinder"
                data-details="Ich habe die alte Webseite, die mit Wordpress erstellt wurde, neu erstellt Mithilfe von HTML und CSS, dabei besteht das CSS von Bootstrap"
                data-image="/img/PfadiVennesLogo2.png" data-link="https://websitevennes.netlify.app/">
                <img class="project-preview" src="/img/PfadiVennesLogo2.png" alt="Pfadifinder Projektbild" />
                <h3>Pfadifinder Webseite</h3>
                <p>Neues Design für Vereinswebsite, mobile optimiert.</p>
            </article>

            <article class="card" data-title="Project title"
                data-description="Ein persönliches Portfolio mit Verwaltungsbereich"
                data-details="Dieses Projekt zeigt ein Portfolio mit dynamischer Inhalte-Verwaltung. Enthält Projekt- und Blog-Module sowie ein Dark-Mode-Feature."
                data-image="/img/filler.png" data-link="https://example.com/portfolio-cms">
                <img class="project-preview" src="/img/filler.png" alt="template-picture-name" />
                <h3>project title</h3>
                <p>description</p>
            </article>
            <!---
            <article class="card" data-title="Project title"
                data-description="Ein persönliches Portfolio mit Verwaltungsbereich"
                data-details="Dieses Projekt zeigt ein Portfolio mit dynamischer Inhalte-Verwaltung. Enthält Projekt- und Blog-Module sowie ein Dark-Mode-Feature."
                data-image="/img/filler.png" data-link="https://example.com/portfolio-cms">
                <img class="project-preview" src="/img/filler.png" alt="template-picture-name" />
                <h3>project title</h3>
                <p>description</p>
            </article>
-->
        </section>
        <div class="modal-overlay" id="modalOverlay" aria-hidden="true">
            <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle"
                aria-describedby="modalDescription">
                <button class="modal-close" id="modalClose" aria-label="Schließen">✕</button>
                <img id="modalImage" src="" alt="Projektbild" class="modal-image" />
                <h2 id="modalTitle">Titel</h2>
                <p id="modalDescription">Beschreibung</p>
                <p id="modalDetails" class="modal-details"></p>
                <a id="modalActionBtn" class="modal-action-button" href="#" target="_blank"
                    rel="noopener noreferrer">Zum Projekt</a>
            </div>
        </div>
    </main>
    <script>
        const cards = document.querySelectorAll('.card');
        const overlay = document.getElementById('modalOverlay');
        const modalTitle = document.getElementById('modalTitle');
        const modalDescription = document.getElementById('modalDescription');
        const modalDetails = document.getElementById('modalDetails');
        const modalImage = document.getElementById('modalImage');
        const modalActionBtn = document.getElementById('modalActionBtn');
        const closeBtn = document.getElementById('modalClose');

        function openModal(card) {
            const title = card.dataset.title || 'Projekt';
            const description = card.dataset.description || '';
            const details = card.dataset.details || '';
            const image = card.dataset.image || '';

            modalTitle.textContent = title;
            modalDescription.textContent = description;
            modalDetails.textContent = details;

            if (image) {
                modalImage.src = image;
                modalImage.style.display = 'block';
                modalImage.alt = `${title} Bild`;
            } else {
                modalImage.src = '';
                modalImage.style.display = 'none';
            }

            const link = card.dataset.link || '#';
            if (link && link !== '#') {
                modalActionBtn.href = link;
                modalActionBtn.style.display = 'inline-block';
            } else {
                modalActionBtn.href = '#';
                modalActionBtn.style.display = 'none';
            }

            overlay.classList.add('active');
            overlay.setAttribute('aria-hidden', 'false');
        }

        function closeModal() {
            overlay.classList.remove('active');
            overlay.setAttribute('aria-hidden', 'true');
        }

        cards.forEach(card => {
            card.addEventListener('click', () => openModal(card));
        });

        closeBtn.addEventListener('click', closeModal);
        overlay.addEventListener('click', event => {
            if (event.target === overlay) closeModal();
        });

        document.addEventListener('keydown', event => {
            if (event.key === 'Escape' && overlay.classList.contains('active')) {
                closeModal();
            }
        });
    </script>

    <footer>
        <p>&copy; 2024 Portfolio. All rights reserved.</p>
    </footer>
</body>

</html>
